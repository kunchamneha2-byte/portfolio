<main id="main-content">

<h1>Contact</h1>

<form action="#" method="post">

<fieldset>

<legend>Contact Form</legend>

<div>

<label for="name">
Full Name
</label>

<input
id="name"
name="name"
type="text"
required
autocomplete="name">

</div>

<div>

<label for="email">
Email
</label>

<input
id="email"
name="email"
type="email"
required
autocomplete="email">

</div>

<div>

<label for="subject">
Subject
</label>

<input
id="subject"
name="subject"
type="text">

</div>

<div>

<label for="message">
Message
</label>

<textarea
id="message"
name="message"
rows="6"
required></textarea>

</div>

<button type="submit">
Send Message
</button>

</fieldset>

</form>

</main>
